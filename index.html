<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Диагностика макияжа</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0a0c;
    --bg2:#141015;
    --card:#181218;
    --card-2:#1f1820;
    --ink:#f4eaee;
    --muted:#a99aa0;
    --line:#2c2329;
    --wine:#ee8fab;
    --wine-d:#f4a9c0;
    --gold:#f6b9ca;
    --gold-d:#ee8fab;
    --rose-soft:#2a1a23;
    --green:#5cc095;
    --amber:#e3a85f;
    --red:#e5484d;
    --shadow:0 20px 55px rgba(0,0,0,.55);
    --shadow-sm:0 8px 24px rgba(0,0,0,.45);
    --glow:0 0 24px rgba(238,143,171,.45);
    --radius:20px;
    --grad-gold:linear-gradient(135deg,#f6b9ca,#ee8fab);
    --grad-wine:linear-gradient(135deg,#f3a4bd,#e87aa0);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;touch-action:pan-y;-ms-touch-action:pan-y}
  button,input,.ctype,.abtn{touch-action:manipulation}
  body{
    font-family:'Jost','Segoe UI',sans-serif;
    color:var(--ink);
    font-size:17px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 650px at 82% -12%, rgba(238,143,171,.20) 0%, transparent 60%),
      radial-gradient(950px 620px at -12% 112%, rgba(238,143,171,.13) 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed;
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    overflow-x:clip;   /* clip не ломает position:sticky, в отличие от hidden на контейнере */
  }
  h1,h2,h3{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;letter-spacing:.3px}

  /* ===== Top progress & stage bar ===== */
  .topline{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.06);z-index:30}
  .topline i{display:block;height:100%;width:0;background:var(--grad-wine);
    box-shadow:0 0 10px rgba(238,143,171,.55);transition:width .45s cubic-bezier(.2,.8,.2,1)}
  .stagebar{position:fixed;top:4px;left:0;right:0;z-index:29;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));
    pointer-events:none;
    background:rgba(13,10,12,.92);backdrop-filter:blur(8px)}
  .stagebar>*{pointer-events:auto}
  .backbtn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);
    background:var(--card);color:var(--muted);font-size:18px;cursor:pointer;
    display:grid;place-items:center;transition:.2s;flex-shrink:0}
  .backbtn:hover{border-color:var(--gold);color:var(--wine-d)}
  .backbtn.hid{opacity:0;pointer-events:none}
  .stagelbl{font-size:11.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-d);
    font-weight:600;text-align:center;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sound-toggle{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);
    background:var(--card);cursor:pointer;display:grid;place-items:center;font-size:15px;transition:.2s;flex-shrink:0}
  .sound-toggle:hover{border-color:var(--gold)}

  /* ===== Quiz stage ===== */
  #stage{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:76px 18px calc(26px + env(safe-area-inset-bottom))}
  #cardHost{width:100%;max-width:480px;perspective:900px}

  .readychip{max-width:480px;width:100%;margin:0 auto 14px;
    background:linear-gradient(180deg,#211824,#181219);border:1px solid var(--line);
    border-radius:14px;padding:11px 16px}
  .readychip .rt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .readychip .rt span{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .readychip .rt b{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;transition:color .4s}
  .rbar{height:9px;border-radius:9px;background:var(--line);overflow:hidden}
  .rbar i{display:block;height:100%;width:0;border-radius:9px;transition:width .6s cubic-bezier(.2,.8,.2,1),background .5s}

  .qcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:30px 26px 26px;border:1px solid rgba(244,169,192,.14);position:relative;
    transition:transform .34s cubic-bezier(.4,.1,.3,1),opacity .3s;will-change:transform,opacity}
  .qcard::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:var(--grad-wine);border-radius:var(--radius) var(--radius) 0 0}
  .qcard.fly-l{transform:translateX(-130%) rotate(-7deg);opacity:0}
  .qcard.fly-r{transform:translateX(130%) rotate(7deg);opacity:0}
  .qcard.enter-r{transform:translateX(80px) scale(.95);opacity:0}
  .qcard.enter-l{transform:translateX(-80px) scale(.95);opacity:0}

  .qtag{display:inline-flex;align-items:center;gap:7px;color:var(--gold-d);
    font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px}
  .qtag::before{content:"";width:16px;height:1px;background:var(--gold)}
  .qcard h2{margin:0 0 8px;font-size:32px;line-height:1.1}
  .qcard .sub{color:var(--muted);margin:0 0 22px;font-size:16px;line-height:1.5}
  .qcard .hint{color:var(--muted);margin:-4px 0 20px;font-size:14.5px;font-weight:300}
  .base-tag{display:inline-block;vertical-align:middle;margin-left:9px;font-style:normal;
    font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:#1a1014;
    background:var(--grad-gold);padding:3px 9px;border-radius:20px}

  /* answer buttons */
  .answers{display:flex;flex-direction:column;gap:11px}
  .answers.row{flex-direction:row}
  .answers.row .abtn{flex:1}
  .abtn{border:1.5px solid var(--line);background:var(--card-2);color:var(--ink);
    min-height:56px;padding:14px 20px;border-radius:16px;font-size:17.5px;font-weight:500;
    cursor:pointer;transition:.18s;font-family:inherit;text-align:center}
  .abtn:hover{border-color:var(--gold)}
  .abtn.picked{background:var(--grad-wine);border-color:transparent;color:#1a1014;
    box-shadow:var(--glow);transform:scale(1.02)}
  .abtn.picked-dim{background:var(--rose-soft);border-color:var(--wine);color:var(--wine-d)}
  .abtn.picked[data-good="1"]{background:var(--green);border-color:var(--green);color:#fff;
    box-shadow:0 0 18px rgba(92,192,149,.5),0 4px 12px rgba(92,192,149,.35)}
  .abtn.picked[data-good="0"]{background:var(--red);border-color:var(--red);color:#fff;
    box-shadow:0 0 18px rgba(229,72,77,.55),0 4px 12px rgba(229,72,77,.4)}
  .abtn.picked-dim[data-good="1"]{background:rgba(92,192,149,.12);border-color:var(--green);color:var(--green)}
  .abtn.picked-dim[data-good="0"]{background:rgba(229,72,77,.10);border-color:var(--red);color:#f0787c}

  .qphase2{margin-top:22px;padding-top:20px;border-top:1px solid var(--line);
    animation:phaseIn .35s ease both}
  @keyframes phaseIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .qphase2 .qq{font-size:19px;font-weight:500;margin:0 0 13px}

  /* checklist chips (косметичка) */
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chip{border:1.5px solid var(--line);border-radius:14px;padding:12px 13px;cursor:pointer;
    background:var(--card-2);transition:.15s;user-select:none;position:relative}
  .chip:active{transform:scale(.97)}
  .chip b{display:block;font-weight:500;font-size:15px;line-height:1.3;padding-right:20px}
  .chip small{display:block;color:var(--muted);font-size:11.5px;line-height:1.3;margin-top:2px;font-weight:300}
  .chip::after{content:"";position:absolute;top:10px;right:10px;width:19px;height:19px;border-radius:50%;
    border:1.5px solid var(--line);transition:.15s;display:grid;place-items:center;font-size:11px;font-weight:700}
  .chip.on{border-color:var(--wine);background:linear-gradient(180deg,var(--card-2),var(--rose-soft));box-shadow:var(--glow)}
  .chip.on::after{content:"✓";background:var(--grad-wine);border-color:transparent;color:#1a1014}
  .chip.good.on{border-color:var(--green);background:linear-gradient(180deg,var(--card-2),#15221a);
    box-shadow:0 0 18px rgba(92,192,149,.35)}
  .chip.good.on::after{background:var(--green);color:#fff}
  .chip .base-tag{margin-left:6px}
  .chips-count{text-align:center;color:var(--muted);font-size:13.5px;margin:12px 0 14px;min-height:20px}
  .chips-count b{color:var(--wine-d)}

  /* compact skill sliders (все на одной странице) */
  .slrow{margin-bottom:18px}
  .slrow .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:2px}
  .slrow .top b{font-size:17.5px;font-weight:500}
  .slrow .top span{font-size:14.5px;font-weight:600;transition:color .2s;text-align:right;white-space:nowrap}
  .slhint{font-size:14px;color:var(--muted);margin:0 0 8px;font-weight:300;line-height:1.35}
  .slrow input[type=range]{margin:0;height:8px}
  .slrow input[type=range]::-webkit-slider-thumb{width:26px;height:26px;border-width:3px}
  .slrow input[type=range]::-moz-range-thumb{width:26px;height:26px;border-width:3px}

  /* colortype cards */
  .grid2{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:430px){.grid2{grid-template-columns:1fr 1fr}}
  .ctype{border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;cursor:pointer;
    transition:.22s;background:var(--card-2);position:relative;overflow:hidden}
  .ctype:hover{border-color:var(--gold)}
  .ctype.sel{border-color:var(--wine);background:linear-gradient(180deg,var(--card-2),var(--rose-soft));box-shadow:var(--glow)}
  .ctype.sel::after{content:"✓";position:absolute;top:12px;right:13px;width:24px;height:24px;
    background:var(--grad-wine);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:13px}
  .ctype h3{margin:0 0 4px;font-size:23px}
  .ctype p{margin:0 0 11px;font-size:13.5px;color:var(--muted);line-height:1.4}
  .swatches{display:flex;gap:6px}
  .swatches span{width:21px;height:21px;flex-shrink:0;border-radius:50%;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .ctype-dunno{border-style:dashed}
  .ctype-dunno p{margin-bottom:0}
  @media(min-width:430px){.ctype-dunno{grid-column:1/-1}}

  /* intro */
  .field{margin:0 0 8px}
  .field label{display:block;font-size:12px;color:var(--gold-d);margin-bottom:8px;
    font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
  .field input{width:100%;padding:15px 18px;border:1.5px solid var(--line);
    border-radius:14px;font-size:18px;background:var(--card-2);color:var(--ink);transition:.2s;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--wine);box-shadow:0 0 0 4px rgba(238,143,171,.18)}
  .field small{display:block;color:var(--muted);font-size:13px;margin-top:6px;font-weight:300}
  .intro-list{list-style:none;margin:0 0 22px;padding:0}
  .intro-list li{display:flex;gap:11px;align-items:flex-start;margin-bottom:10px;
    font-size:15.5px;color:#d8c8cf;line-height:1.45}
  .intro-list li::before{content:"✦";color:var(--wine);flex-shrink:0;margin-top:1px}
  .crest{width:52px;height:52px;border-radius:50%;background:var(--grad-wine);
    display:grid;place-items:center;margin:0 0 16px;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.14), 0 8px 18px rgba(27,20,23,.35)}
  .crest svg{width:25px;height:25px}

  /* slider */
  .sl-big{margin:6px 0 4px}
  .sl-value{text-align:center;margin:0 0 18px;min-height:74px}
  .sl-value b{display:block;font-family:'Cormorant Garamond',serif;font-size:52px;
    font-weight:600;line-height:1;transition:color .25s}
  .sl-value span{display:block;font-size:17px;margin-top:5px;transition:color .25s;font-weight:500}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:10px;border-radius:10px;
    background:linear-gradient(90deg,var(--c,var(--wine)) 0%,var(--c,var(--wine)) var(--p,50%),var(--line) var(--p,50%));
    outline:none;transition:background .15s;margin:6px 0 4px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:34px;height:34px;border-radius:50%;
    background:#fff;border:3.5px solid var(--c,var(--wine));cursor:pointer;
    box-shadow:0 0 16px var(--cg,rgba(227,128,155,.5)),0 3px 8px rgba(0,0,0,.45)}
  input[type=range]::-moz-range-thumb{width:34px;height:34px;border-radius:50%;
    background:#fff;border:3.5px solid var(--c,var(--wine));cursor:pointer}
  .sl-ends{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:2px 2px 20px}

  /* buttons */
  .btn{border:none;border-radius:30px;padding:16px 32px;font-size:17px;font-weight:500;
    cursor:pointer;transition:.22s;font-family:inherit;letter-spacing:.3px}
  .btn-primary{background:var(--grad-wine);color:#1a1014;box-shadow:0 8px 26px rgba(238,143,171,.45);width:100%}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(238,143,171,.6)}
  .btn-primary:disabled{background:#4a3a42;color:#8d7d84;box-shadow:none;cursor:not-allowed;transform:none}
  .btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--wine-d)}

  .hidden{display:none!important}

  /* sticky wheel on skills screen */
  .wheel-sticky{position:sticky;top:64px;z-index:5;display:flex;flex-direction:column;align-items:center;
    background:var(--card);
    padding:8px 20px 12px;margin:0 -26px 14px;
    border-bottom:1px solid var(--line);
    box-shadow:0 16px 20px -12px rgba(0,0,0,.55)}
  .wheel-sticky svg{width:min(232px,62vw);height:auto;display:block}
  .wheel-react{margin:2px 0 0;min-height:42px;text-align:center;color:var(--wine-d);
    font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;opacity:0;transition:opacity .4s;
    line-height:1.3;padding:0 10px;display:flex;align-items:center;justify-content:center}
  .wheel-react.show{opacity:1}
  #radar .vpoly{transform-box:fill-box;transform-origin:center;animation:breathe 4.5s ease-in-out infinite}

  /* ===== Result ===== */
  .wrap{max-width:640px;margin:0 auto;padding:70px 20px 60px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:34px 26px;margin-bottom:20px;border:1px solid rgba(244,169,192,.14);position:relative}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:var(--grad-wine);border-radius:var(--radius) var(--radius) 0 0}
  .score-hero{text-align:center;padding:6px 0 14px}
  .score-hero h2{font-size:30px;margin:0 0 14px}
  .score-parts{display:flex;justify-content:center;gap:12px;margin:0 0 6px;flex-wrap:wrap}
  .score-parts .part{background:linear-gradient(180deg,#1e1620,#181219);border:1px solid var(--line);
    border-radius:16px;padding:12px 22px;min-width:118px}
  .score-parts .pv{display:block;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;line-height:1}
  .score-parts .pl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .score-caption{max-width:520px;margin:6px auto 0;color:var(--wine-d);font-size:15px;font-style:italic}
  .score-sub{margin:0 auto 10px;color:var(--muted);font-size:15px}
  .ring-wrap{width:190px;height:190px;margin:8px auto 18px;border-radius:50%;
    box-shadow:0 10px 26px rgba(0,0,0,.35);transition:box-shadow .3s}
  .score-ring{display:block;width:100%;height:100%}
  .spinRing{transform-box:fill-box;transform-origin:center;animation:spin 1.1s linear infinite}
  .verdict-badge{display:inline-block;padding:10px 26px;border-radius:30px;font-weight:600;
    font-size:16px;margin-bottom:12px;color:#1a1014;letter-spacing:.5px}
  .verdict-text{max-width:600px;margin:8px auto 0;color:#d8c8cf;font-size:17px;line-height:1.55}
  .res-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:28px 0 0}
  .res-block{margin-top:26px}
  .res-block h3{font-size:25px;margin:0 0 14px;display:flex;align-items:center;gap:9px;line-height:1.2}
  .block-note{margin:-4px 0 14px;color:var(--muted);font-size:14px;line-height:1.45;font-style:italic}

  /* collapsible result blocks */
  .clps{background:linear-gradient(180deg,#1c1420,#181219);border:1px solid var(--line);
    border-radius:16px;padding:16px 18px;transition:border-color .25s}
  .clps.open{border-color:rgba(244,169,192,.28)}
  .clps-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    cursor:pointer;user-select:none}
  .clps-head h3{margin:0;font-size:20px;line-height:1.25;display:flex;align-items:center;gap:8px}
  .clps-meta{display:flex;align-items:center;gap:9px;flex-shrink:0}
  .cnt{background:var(--card-2);border:1px solid var(--line);color:var(--muted);
    font-size:12px;border-radius:20px;padding:3px 10px;white-space:nowrap}
  .chev{color:var(--muted);transition:transform .25s;font-size:13px}
  .clps.open .chev{transform:rotate(180deg)}
  .clps-body{display:none;margin-top:14px}
  .clps.open .clps-body{display:block;animation:phaseIn .3s ease both}
  .clps-body .pill-list li{background:var(--card-2)}
  .pill-list{list-style:none;padding:0;margin:0}
  .pill-list li{background:linear-gradient(180deg,#1e1620,#181219);border:1px solid var(--line);
    border-radius:14px;padding:15px 16px;margin-bottom:10px;font-size:16px;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .pill-list li .ic{flex-shrink:0;width:27px;height:27px;border-radius:50%;display:grid;
    place-items:center;font-size:13px;color:#fff;margin-top:1px;font-weight:600}
  .ic-crit{background:var(--red)} .ic-grow{background:var(--amber)} .ic-good{background:var(--green)}
  .ic-check{background:var(--wine)}
  .pill-list li b{display:block;margin-bottom:2px;font-weight:600}
  .pill-list li span.t{color:#c3b4ba;font-size:15px}
  .pill-list li .txt{flex:1}
  .pill-list li.committed{border-color:var(--green);box-shadow:0 0 0 1px var(--green) inset}
  .fix{flex-shrink:0;display:flex;align-items:center;cursor:pointer;user-select:none;align-self:center}
  .fix input{appearance:none;-webkit-appearance:none;width:26px;height:26px;border-radius:8px;
    border:2px solid var(--line);background:var(--card-2);cursor:pointer;position:relative;transition:.2s;margin:0}
  .fix input:hover{border-color:var(--wine)}
  .fix input:checked{background:var(--green);border-color:var(--green)}
  .fix input:checked::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:15px;font-weight:700}
  .palette-res{display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,#1e1620,#181219);
    border:1px solid var(--line);border-radius:14px;padding:15px 16px;flex-wrap:wrap}
  .palette-res .sw{display:flex;gap:6px;flex-shrink:0}
  .palette-res .sw span{width:32px;height:32px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
  .potential{background:linear-gradient(180deg,#221824,#181219);border:1px solid rgba(244,169,192,.18);
    border-radius:16px;padding:22px 20px;text-align:center;box-shadow:var(--glow)}
  .pot-row{display:flex;align-items:center;justify-content:center;gap:20px;margin:14px 0 6px}
  .pot{display:flex;flex-direction:column;gap:2px}
  .pot span{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;line-height:1}
  .pot small{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .pot-arrow{font-size:30px;color:var(--wine);font-weight:300}
  .pot-lead{max-width:540px;margin:2px auto 0;color:var(--wine-d);font-size:15.5px;line-height:1.5}
  .check-all{margin-top:16px;border:1.5px solid var(--wine);background:transparent;color:var(--wine-d);
    border-radius:30px;padding:10px 24px;font-size:14.5px;font-weight:500;cursor:pointer;
    font-family:inherit;transition:.2s}

  window.scrollTo({top:0});
  if(dir!==0) requestAnimationFrame(()=>requestAnimationFrame(()=>{
    card.classList.remove('enter-r','enter-l');
  }));
}
function goNext(){
  if(animating) return; animating=true;
  const card=host.firstElementChild;
  if(card) card.classList.add('fly-l');
  setTimeout(()=>{
    animating=false;
    if(idx < SCREENS.length-1){
      idx++;
      if(SCREENS[idx].type==='bagFit' && !anyHave()) idx++;  // нечего проверять — пропускаем
      renderCard(1);
    }
    else finishQuiz();
  }, 330);

function goBack(){
  if(animating || idx===0) return; animating=true;
  const card=host.firstElementChild;
  if(card) card.classList.add('fly-r');
  setTimeout(()=>{
    animating=false;
    idx--;
    if(SCREENS[idx].type==='bagFit' && !anyHave()) idx--;
    renderCard(-1);
  }, 330);
}

/* ---------- RADAR ---------- */
const GOAL=4.7;
let radarFill=1;
function drawRadar(){
  const svg=document.getElementById('radar');
  if(!svg) return;
  const cx=160,cy=150,R=96,Rb=120,n=SKILLS.length,step=2*Math.PI/n;
  const A=i=>-Math.PI/2 + i*step;
  const pol=(r,a)=>[cx+r*Math.cos(a), cy+r*Math.sin(a)];
  const f=v=>v.toFixed(1);
  const wedge=(r,a0,a1)=>{const[x0,y0]=pol(r,a0),[x1,y1]=pol(r,a1);
    return `M${f(cx)},${f(cy)} L${f(x0)},${f(y0)} A${f(r)},${f(r)} 0 0 1 ${f(x1)},${f(y1)} Z`;};
  const band=(r0,r1,a0,a1)=>{const[x0,y0]=pol(r1,a0),[x1,y1]=pol(r1,a1),[x2,y2]=pol(r0,a1),[x3,y3]=pol(r0,a0);
    return `M${f(x0)},${f(y0)} A${f(r1)},${f(r1)} 0 0 1 ${f(x1)},${f(y1)} L${f(x2)},${f(y2)} A${f(r0)},${f(r0)} 0 0 0 ${f(x3)},${f(y3)} Z`;};
  let h='';
  for(let k=1;k<=5;k++) h+=`<circle cx="${cx}" cy="${cy}" r="${f(R*k/5)}" fill="none" stroke="#352a31" stroke-width="1"/>`;
  SKILLS.forEach((sk,i)=>{
    const a0=A(i)-step/2, a1=A(i)+step/2;
    const v=state.skills[sk.key], col=VALCOL[v-1];
    h+=`<path d="${band(R,Rb,a0,a1)}" fill="rgba(255,255,255,.05)" stroke="#352a31" stroke-width="1"/>`;
    const rv=R*v/5*radarFill;
    h+=`<path d="${wedge(rv,a0,a1)}" fill="${col}" fill-opacity=".5" stroke="none"/>`;
    const [lx0,ly0]=pol(rv,a0),[lx1,ly1]=pol(rv,a1);
    h+=`<path d="M${f(lx0)},${f(ly0)} A${f(rv)},${f(rv)} 0 0 1 ${f(lx1)},${f(ly1)}" fill="none" stroke="${col}" stroke-width="2.5"/>`;
    const [bx,by]=pol(Rb,a0);
    h+=`<line x1="${cx}" y1="${cy}" x2="${f(bx)}" y2="${f(by)}" stroke="#352a31" stroke-width="1"/>`;
    const [tx,ty]=pol((R+Rb)/2, A(i));
    let rot=A(i)*180/Math.PI+90; const nr=((rot%360)+360)%360; if(nr>90&&nr<270) rot+=180;
    const shortLbl=sk.label.split(' ')[0];
    h+=`<text x="${f(tx)}" y="${f(ty)}" transform="rotate(${f(rot)} ${f(tx)} ${f(ty)})" font-size="9" fill="#f4eaee" text-anchor="middle" dominant-baseline="middle" font-family="Jost,sans-serif">${shortLbl}</text>`;
  });
  h+=`<circle cx="${cx}" cy="${cy}" r="${f(R*GOAL/5)}" fill="none" stroke="#f0a4bb" stroke-width="2" stroke-dasharray="5 4" opacity=".9"/>`;
  h+=`<circle cx="${cx}" cy="${cy}" r="8" fill="#181218" stroke="#352a31" stroke-width="1.5"/>`;
  svg.innerHTML=h;
}
function animateRadarIn(){
  radarFill=0; drawRadar();
  const t0=performance.now()+120, dur=1600;
  (function f(t){
    if(t<t0){ requestAnimationFrame(f); return; }
    const k=Math.min(1,(t-t0)/dur);
    radarFill=1-Math.pow(1-k,3);
    drawRadar();
    if(k<1) requestAnimationFrame(f);
  })(performance.now());
}
function updateWheelReact(){
  const el=document.getElementById('wheelReact'); if(!el) return;
  const vals=SKILLS.map(s=>state.skills[s.key]);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const lows=vals.filter(v=>v<=2).length, highs=vals.filter(v=>v>=4).length;
  let pool;
  if(avg>=4.3) pool=REACT.great;
  else if(lows>=3) pool=REACT.bad;
  else if(lows>=1 && highs>=3) pool=REACT.uneven;
  else pool=REACT.mid;
  el.textContent='«'+pool[0]+'»';
  el.classList.add('show');
}

/* ---------- VERDICT ENGINE ---------- */
function buildVerdict(avg, nMiss, nUnsure){
  const s=state.skills;
  const bg=k=>state.bag[k]||{};
  const miss=k=>bg(k).has==='нет';
  const unsure=k=>bg(k).has==='есть'&&bg(k).fit==='не знаю';
  const bad=k=>miss(k)||unsure(k);   // средства нет ИЛИ не уверена, что оно твоё

  let color,tierTitle;
  if(avg<2.5){color='var(--red)';tierTitle='Есть над чем поработать';}
  else if(avg<3.7){color='var(--amber)';tierTitle='Хорошая база — но ещё не уровень';}
  else if(avg<4.4){color='var(--wine)';tierTitle='Хороший уровень';}
  else{color='var(--green)';tierTitle='Эталонный уровень';}

  const T=[
    {on:s.correct<=3 && bad('bronzer'), w:(s.correct<=2?6:5),
     text: miss('bronzer')
       ? 'Коррекция почти не читается: для неё пока нет нужных средств, и рука ещё не знает, куда наносить.'
       : 'Коррекция выходит неуверенно — и не факт, что средства для неё твои. Тут стоит проверить и продукты, и технику.'},
    {on:s.tone<=3 && (bad('tone')||bad('care')||bad('powder')), w:(s.tone<=2?6:5),
     text: miss('tone')
       ? 'Тон неровный во многом потому, что нет подходящего тонального — без правильной базы остальное проседает.'
       : 'Тон ложится неровно — возможно, дело не только в руке, но и в самой базе. Стоит проверить, твой ли оттенок.'},
    {on:s.arrows<=2 && bad('eyepencil'), w:5,
     text: miss('eyepencil')
       ? 'Стрелки не выходят — техника не закреплена, да и карандаша для них пока нет.'
       : 'Стрелки не выходят — тут и техника не закреплена, и карандаш, возможно, не тот.'},
    {on:s.mistakes<=3 && nUnsure>=2, w:(nUnsure>=3?6:5),
     text:'Ошибки могут быть не от рук: часть косметики куплена наугад, и не факт, что она твоя. Продукты стоит проверить.'},
    {on:s.variety<=2 && s.adapt<=2, w:5,
     text:'Образы крутятся вокруг пары привычных: новое из Pinterest перенести на себя пока сложно.'},
    {on:s.variety<=2 && s.adapt>2, w:3,
     text:'Один и тот же макияж на все случаи уже приелся — не хватает готовых схем под повод.'},
    {on:s.adapt<=2 && s.variety>2, w:3,
     text:'Образы нравятся, но повторить их на себе пока трудно — нет ощущения, как подгонять под свои черты.'},
    {on:s.speed<=2 && (s.mistakes<=2||s.clean<=2), w:3,
     text:'Макияж даётся долго и с огрехами — не хватает понятной последовательности.'},
    {on:(s.tone<=2||s.clean<=2), w:2,
     text:'Базовое — ровный тон и чистая растушёвка — пока не дотянуто, а это видно первым делом.'},
    {on:nUnsure>=2 && nMiss<2, w:3,
     text:'Сами навыки есть, но часть средств куплена наугад — не факт, что они работают на тебя. Их стоит проверить.'},
    {on:nMiss>=2, w:(nMiss>=4?4:2.5),
     text:'Для идеального мейка не хватает части базовых средств — без них образ не собрать целиком.'}
  ].filter(t=>t.on).sort((a,b)=>b.w-a.w);

  if(!T.length){
    const base = avg>=4.2
      ? 'Всё ровно и сильно — дальше только тонкая шлифовка и новые образы.'
      : 'Крепкая основа есть, осталось закрыть пару точечных зон.';
    return {title:tierTitle, color, text:base+' Подробнее — по пунктам ниже.'};
  }
  return {title:tierTitle, color, text:T[0].text+' Подробнее — по пунктам ниже.'};
}

/* ---------- SCORES ---------- */
function cosmScoreFrom(fixed){   // fixed — Set ключей, которые считаем исправленными
  const val=b=>{const s=state.bag[b.key];
    if(s.has===null) return null;
    if(fixed&&fixed.has(b.key)) return 5;
    if(s.has==='нет') return 1;
    if(s.fit==='подходит') return 5;
    if(s.fit==='не знаю') return 3;
    return 3.5;
  };
  const others=[], founds=[];
  BAG.forEach(b=>{const v=val(b); if(v===null) return; (b.base?founds:others).push({v});});
  if(!others.length && !founds.length) return null;
  // вес: уход + тон вместе в 2 раза важнее всех остальных пунктов вместе
  const foundTotalW = others.length ? others.length*2 : founds.length;
  const fw = founds.length ? foundTotalW/founds.length : 0;
  let cq=0,cw=0;
  others.forEach(i=>{cq+=i.v; cw+=1;});
  founds.forEach(i=>{let v=i.v; if(v<=2) v=Math.max(1,v-0.5); cq+=v*fw; cw+=fw;});
  let sc=cq/cw;
  // жёсткий кап: базы нет; мягкий кап: база есть, но не уверена, что подходит
  const baseState=k=>{ if(fixed&&fixed.has(k)) return 'ok';
    const s=state.bag[k];
    if(s.has==='нет') return 'hard';
    if(s.has==='есть'&&s.fit==='не знаю') return 'soft';
    return 'ok'; };
  const hard=['care','tone'].filter(k=>baseState(k)==='hard').length;
  const soft=['care','tone'].filter(k=>baseState(k)==='soft').length;
  if(hard===2) sc=Math.min(sc,2.1);
  else if(hard===1) sc=Math.min(sc,2.9);
  else if(soft>=1) sc=Math.min(sc,3.4);
  return Math.max(1,Math.min(5,sc));
}
function combineScore(skill,cosm){
  if(cosm==null) return skill;
  const d=cosm-skill;
  return Math.max(1, Math.min(5, skill + (d>=0?Math.min(d*0.15,0.35):Math.max(d*0.45,-1.2))));
}

function encodeResult(){
  const data={n:state.name, c:state.colortype,
    b:BAG.map(b=>{const s=state.bag[b.key];
      return s.has==='нет'?'0':s.fit==='подходит'?'1':s.fit==='не знаю'?'2':'3';}).join(''),
    s:SKILLS.map(s=>state.skills[s.key]).join('')};
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function resultLink(){
  return location.origin+location.pathname+'#r='+encodeResult();
}
function decodeResultHash(){
  const m=location.hash.match(/^#r=(.+)$/);
  if(!m) return false;
  try{
    const d=JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    if(!d||typeof d.b!=='string'||typeof d.s!=='string') return false;
    state.name=d.n||''; state.colortype=d.c||null;
    BAG.forEach((b,i)=>{const ch=d.b[i];
      state.bag[b.key]= ch==='0'?{has:'нет',fit:null}
        : ch==='1'?{has:'есть',fit:'подходит'}
        : ch==='2'?{has:'есть',fit:'не знаю'}
        : ch==='3'?{has:'есть',fit:null}
        : {has:null,fit:null};});
    SKILLS.forEach((s,i)=>{const v=+d.s[i]; state.skills[s.key]=(v>=1&&v<=5)?v:3;});
    return true;
  }catch(e){ return false; }
}

function recomputePotential(){
  const boxes=[...document.querySelectorAll('.fixcb')];
  const total=boxes.length, checked=boxes.filter(cb=>cb.checked).length;
  const cap = resAvg>=4 ? 4.9 : 4.5;
  const pot = total ? resAvg + (cap-resAvg)*(checked/total) : resAvg;
  const el=document.getElementById('potVal');
  if(el){ el.textContent=pot.toFixed(1); el.style.color=scoreColor(pot); }
}
function scoreColor(v){
  if(v<1) return '#e5484d';
  if(v<2) return '#ef6a5a';
  if(v<3) return '#f0863a';
  if(v<4) return '#dcc63a';
  return '#3fa564';
}
function animateNumber(el, target, dur){
  if(!el) return;
  const t0=performance.now();
  (function f(t){
    const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,4);
    el.textContent=(target*e).toFixed(1);
    if(k<1) requestAnimationFrame(f);
  })(t0);
}
function animateScore(avg){
  const num=document.getElementById('scoreNum'), arc=document.getElementById('scoreArc');
  if(!num||!arc) return;
  const ringWrap=document.getElementById('ringWrap'), spin=document.getElementById('spinRing'),
        unit=document.getElementById('scoreUnit');
  setTimeout(()=>{
    if(spin) spin.style.display='none';
    arc.style.opacity='1';
    if(unit) unit.style.opacity='1';
    num.setAttribute('font-size','46');
    num.setAttribute('font-family',"'Cormorant Garamond',Georgia,serif");
    num.setAttribute('y','84');
    num.setAttribute('dominant-baseline','auto');
    tick(880,.1,.05);
    const C=2*Math.PI*72, target=(avg-1)/4, t0=performance.now(), dur=1500;
    (function f(t){
      const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3);
      const cur=avg*e, col=scoreColor(cur);
      num.textContent=cur.toFixed(1); num.setAttribute('fill',col);
      arc.setAttribute('stroke',col); arc.setAttribute('stroke-dashoffset', C*(1-target*e));
      if(ringWrap) ringWrap.style.boxShadow=`0 0 24px ${col}55, 0 10px 28px ${col}33`;
      if(k<1) requestAnimationFrame(f);
    })(t0);
  }, 2200);
}

/* ---------- LEAD ---------- */
function bindLead(ctx){
  const baseLines=()=>{
    const lines=[
      'Имя: '+(state.name||'—'),
      `Оценка: ${ctx.avg.toFixed(1)} из 5 (косметичка ${ctx.cosmScore!=null?ctx.cosmScore.toFixed(1):'—'}, навыки ${ctx.skillScore.toFixed(1)})`,
      'Цветотип: '+(state.colortype==='unknown'?'не знает (нужно определить)':(COLORTYPES.find(c=>c.key===state.colortype)?.name||'—'))
    ];
    if(ctx.missing.length) lines.push('Нет: '+ctx.missing.map(b=>b.name).join(', '));
    if(ctx.unsure.length) lines.push('Проверить: '+ctx.unsure.map(b=>b.name).join(', '));
    if(ctx.crit.length) lines.push('Слабые навыки: '+ctx.crit.map(x=>x.s.label).join(', '));
    lines.push('Результат: '+resultLink());
    return lines;
  };
  const thanksHtml=`
    <div class="lead-ok">
      <div class="big">💌</div>
      <h3>Заявка отправлена!</h3>
      <p>Я скоро свяжусь с тобой${state.name?', '+state.name:''}, и познакомлю тебя с программой моего онлайн-обучения.</p>
      <p class="outro" style="margin-top:14px">Спасибо за доверие 🤍</p>
    </div>`;
  async function submit(btn, err, contactLines){
    err.style.display='none';
    const old=btn.textContent;
    btn.disabled=true; btn.textContent='Отправляю…';
    const lines=['🆕 Заявка с диагностики макияжа', ...contactLines, ...baseLines()];
    try{
      const results=await Promise.allSettled(TG_CHAT_IDS.map(id=>
        fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({chat_id:id, text:lines.join('\n')})
        })
      ));
      results.forEach((r,i)=>{ if(r.status==='rejected') console.error('TG send to '+TG_CHAT_IDS[i]+' failed:', r.reason); });
      // успех, если заявка дошла хотя бы одному получателю
      const delivered=results.filter(r=>r.status==='fulfilled'&&r.value.ok).length;
      if(!delivered) throw new Error('tg send failed');
      tick(880,.12,.06);
      document.querySelectorAll('#resultBody .lead').forEach(b=>b.innerHTML=thanksHtml);
    }catch(e){
      btn.disabled=false; btn.textContent=old;
      err.textContent='Не получилось отправить. Проверь интернет или напиши нам напрямую в Telegram.';
      err.style.display='block'; tick(300);
    }
  }
  // форма — телефон + telegram
  const btn=document.getElementById('leadSend');
  if(btn) btn.onclick=()=>{
    const phone=document.getElementById('leadPhone').value.trim();
    const tg=document.getElementById('leadTg').value.trim();
    const err=document.getElementById('leadErr');
    if((phone.replace(/\D/g,'').length<7) && !tg){
      err.textContent='Оставь телефон или ник в Telegram — иначе мы не сможем связаться.';
      err.style.display='block'; tick(300); return;
    }
    submit(btn, err, ['Телефон: '+(phone||'—'), 'Telegram: '+(tg||'—')]);
  };
}

/* ---------- SOUND ---------- */
let soundOn=true, actx=null;
function tick(freq=600,dur=0.05,vol=0.06){
  if(!soundOn) return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
document.getElementById('soundToggle').onclick=()=>{
  soundOn=!soundOn;
  document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔈';
  if(soundOn) tick(660);
};

  }
});

/* ---------- ВЫХОД ИЗ ВСТРОЕННОГО БРАУЗЕРА TELEGRAM ---------- */
/* внутри тг-браузера легко случайно свайпнуть и потерять прогресс —
   пробуем открыть системный браузер, иначе показываем подсказку */
(function(){
  const ua=navigator.userAgent||'';
  const inTg = typeof window.TelegramWebviewProxy!=='undefined' || /Telegram/i.test(ua);
  if(!inTg) return;
  try{
    if(sessionStorage.getItem('tgEscapeTried')) return;
    sessionStorage.setItem('tgEscapeTried','1');
  }catch(e){}
  const full=location.href;
  if(/android/i.test(ua)){
    location.href='intent://'+location.host+location.pathname+location.search+
      '#Intent;scheme=https;action=android.intent.action.VIEW;end';
  }else{
    location.href='x-safari-'+full;
  }
})();

/* ---------- NO ZOOM (iOS Safari игнорирует метатег) ---------- */
['gesturestart','gesturechange','gestureend'].forEach(ev=>
  document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));
let lastTouch=0;
document.addEventListener('touchend',e=>{
  const now=Date.now();
  // двойной тап по пустому месту = зум → глушим; кнопки и поля не трогаем
  if(now-lastTouch<300 && !e.target.closest('button,input,label,a,.ctype'))
    e.preventDefault();
  lastTouch=now;
},{passive:false});

/* ---------- INIT ---------- */
if(decodeResultHash()) showResult();
else { loadProgress(); renderCard(0); }
</script>
